document.getElementById('upd').textContent = '更新: 07/05 00:06';

const SIG = {
  bottom_strong:'強底値',
  bottom:'底値圏',
  near_bottom:'底値付近',
  normal:'通常',
  no_data:'データなし'
};

let curSort='bottom', curFilter='all', q='';
document.getElementById('srch').addEventListener('input',e=>{q=e.target.value.toLowerCase();render();});

function sortBy(k,btn){
  curSort=k;
  document.querySelectorAll('#btn-pri,#btn-sec,#btn-bot,#btn-div').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function filterBy(k,btn){
  curFilter=k;
  document.querySelectorAll('#f-all,#f-bot,#f-near').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function getList(){
  let d=[...DATA];
  if(q) d=d.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.code||'').includes(q)||(s.sector||'').includes(q));
  if(curFilter==='bottom_only') d=d.filter(s=>s.signal==='bottom_strong'||s.signal==='bottom');
  if(curFilter==='near_only')   d=d.filter(s=>['bottom_strong','bottom','near_bottom'].includes(s.signal));
  if(curSort==='priority') d.sort((a,b)=>{const ap=a.priority==='○'?0:1,bp=b.priority==='○'?0:1;return ap-bp||(b.bottom_score||0)-(a.bottom_score||0);});
  else if(curSort==='sector')   d.sort((a,b)=>(a.sector||'').localeCompare(b.sector||'','ja')||(b.bottom_score||0)-(a.bottom_score||0));
  else if(curSort==='bottom')   d.sort((a,b)=>(b.bottom_score||0)-(a.bottom_score||0));
  else if(curSort==='div')      d.sort((a,b)=>parseFloat(b.div_yield||0)-parseFloat(a.div_yield||0));
  return d;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function pflCls(v){if(v==null)return'';if(v<10)return'g';if(v<25)return'y';return'w';}
function rsiCls(v){if(v==null)return'';if(v<35)return'rlo';if(v<50)return'rmd';return'';}

function card(s){
  const pri=s.priority==='○';
  const sig=s.signal||'no_data';
  const score=s.bottom_score||0;
  const divY=s.div_yield?parseFloat(s.div_yield).toFixed(1)+'%':'—';
  const mktcap=s.mktcap?Number(s.mktcap).toLocaleString()+'億':'—';
  const eps=s.eps?Number(s.eps).toLocaleString()+'円':'—';
  const dps=s.dps?Number(s.dps).toLocaleString()+'円':'—';
  const pfl=s.pct_from_low, rsi=s.rsi, ma=s.ma200r;
  return `<div class="card${pri?' pri':''} ${sig}">
<div class="c-head">
  <span class="sec">${esc(s.sector)}</span>
  <div class="bgs">
    ${pri?'<span class="bg-pri">○優先</span>':''}
    <span class="bg-sig s-${sig}">${SIG[sig]||sig}</span>
  </div>
</div>
<div class="c-body">
  <div class="sname">${esc(s.name)}</div>
  <div class="scode">${esc(s.code)}</div>
  ${s.info?`<div class="info">${esc(s.info)}</div>`:''}
  <div class="mets">
    <div class="met"><span class="ml">配当利回り</span><span class="mv div">${divY}</span></div>
    <div class="met"><span class="ml">時価総額</span><span class="mv">${mktcap}</span></div>
    <div class="met"><span class="ml">EPS</span><span class="mv">${eps}</span></div>
    <div class="met"><span class="ml">1株配当</span><span class="mv">${dps}</span></div>
  </div>
</div>
<div class="tbar">
  <div class="ti"><span class="tl">現在値</span><span class="tv">${s.price||'—'}</span></div>
  <div class="ti"><span class="tl">52w安値比</span><span class="tv ${pflCls(pfl)}">${pfl!=null?'+'+pfl+'%':'—'}</span></div>
  <div class="ti"><span class="tl">RSI(14)</span><span class="tv ${rsiCls(rsi)}">${rsi!=null?rsi:'—'}</span></div>
  <div class="ti"><span class="tl">MA200比</span><span class="tv ${ma!=null&&ma<-10?'g':''}">${ma!=null?(ma>=0?'+':'')+ma+'%':'—'}</span></div>
  <div class="sc-wrap"><span class="tl">底値スコア ${score}</span><div class="sc-bar"><div class="sc-fill" style="width:${Math.min(score,100)}%"></div></div></div>
</div>
${s.div_policy?`<div class="dpol">${esc(s.div_policy)}</div>`:''}
</div>`;
}

function render(){
  const d=getList();
  document.getElementById('cnt').textContent=d.length+'件';
  document.getElementById('grid').innerHTML=d.map(card).join('');
}
render();
</script>
