let curTab = 'hold', cardView = true, sortKey = null, sortAsc = true;

// 初期化
(function(){
  document.getElementById('updated-lbl').textContent = D.updated + '更新';
  const PRIORITY_SECS = ['AI・半導体','フィジカルAI','光電融合','電線'];
  const allTags = [...new Set(D.stocks.flatMap(s=>s.tags||[s.sector]).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ja'));
  const ordered = [...PRIORITY_SECS.filter(s=>allTags.includes(s)), ...allTags.filter(s=>!PRIORITY_SECS.includes(s))];
  const sel = document.getElementById('sector-sel');
  ordered.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
  updateCounts();
  render();
})();

function getTabStocks(tab) {
  const a = D.stocks;
  if (tab==='hold')     return a.filter(s=>s.is_hold);
  if (tab==='gureen')   return a.filter(s=>s.is_gureen);
  if (tab==='higezura') return a.filter(s=>s.is_higezura);
  if (tab==='green')    return a.filter(s=>s.signal==='🟢' && !s.is_hold);
  if (tab==='bell')     return a.filter(s=>s.signal==='🔔' && !s.is_hold);
  if (tab==='yellow')   return a.filter(s=>s.signal==='🟡' && !s.is_hold);
  if (tab==='red')      return a.filter(s=>['🔴','⚪',''].includes(s.signal) && !s.is_hold && !s.is_gureen);
  if (tab==='breakout') return D.breakout;
  return a;
}

function applyFilter(stocks) {
  const q   = document.getElementById('search').value.toLowerCase().trim();
  const sec = document.getElementById('sector-sel').value;
  return stocks.filter(s=>{
    if (q && !(s.code||'').toLowerCase().includes(q) && !(s.name||'').includes(q) && !(s.sector||'').toLowerCase().includes(q)) return false;
    if (sec && !(s.tags||[s.sector]).includes(sec)) return false;
    return true;
  });
}

function updateCounts() {
  ['hold','gureen','higezura','green','bell','yellow','red','breakout'].forEach(t=>{
    document.getElementById('cnt-'+t).textContent = getTabStocks(t).length;
  });
}

function switchTab(tab) {
  curTab = tab; sortKey = null;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleView() {
  cardView = !cardView;
  document.getElementById('view-btn').textContent = cardView ? '📋 一覧' : '🃏 カード';
  render();
}

function e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function sigClass(sig){
  return sig==='🟢'?'sig-green':sig==='🟡'?'sig-yellow':sig==='🔴'?'sig-red':sig==='🔔'?'sig-bell':'';
}

function ratingBadge(r){
  if(!r) return '';
  const buy=['強気買い','最上位','買い','格上げ','アウトパフォーム','オーバーウエイト'];
  const sell=['弱気','格下げ','売り','アンダーパフォーム','アンダーウエイト'];
  const cls=buy.some(k=>r.includes(k))?'r-buy':sell.some(k=>r.includes(k))?'r-sell':'r-hold';
  return `<span class="rating-badge ${cls}">${e(r)}</span>`;
}

function chClass(ch){ return !ch?'neu':ch.startsWith('+')?'pos':ch.startsWith('-')?'neg':'neu'; }

function renderCard(s) {
  let badges = '';
  if (s.is_hold)   badges += '<span class="badge b-hold">保有</span>';
  if (s.is_gureen) badges += '<span class="badge b-gureen">🌿ぐりーん</span>';
  if (s.sector)    badges += `<span class="badge b-sector">${e(s.sector)}</span>`;
  if (s.signal && !s.is_hold) badges += `<span class="badge b-signal">${e(s.signal)}</span>`;

  let targetHtml = '';
  if (s.target) targetHtml += `<div>目標 ${e(s.target)}</div>`;
  if (s.upside) {
    const uc = s.upside.startsWith('-')?'upside-n':'upside-p';
    targetHtml += `<div class="${uc}">${e(s.upside)}</div>`;
  }

  let pnlHtml = '';
  if (s.is_hold && s.shares) {
    const pc = (s.pnl_pct>=0?'+':'')+s.pnl_pct.toFixed(1)+'%';
    const py = (s.pnl_yen>=0?'+':'')+s.pnl_yen.toLocaleString();
    const pc2 = s.pnl_pct>=0?'pos':'neg';
    pnlHtml = `<div class="pnl-row">
  <div class="pnl-item"><div class="pnl-lbl">株数</div><div class="pnl-val">${s.shares.toLocaleString()}株</div></div>
  <div class="pnl-item"><div class="pnl-lbl">取得単価</div><div class="pnl-val">${s.avg?s.avg.toLocaleString()+'円':'-'}</div></div>
  <div class="pnl-item"><div class="pnl-lbl">含み損益</div><div class="pnl-val ${pc2}">${pc}<br><small>${py}円</small></div></div>
</div>`;
  }

  let techHtml = '';
  if (s.tech || s.advice) {
    techHtml = `<div class="tech-block">${s.tech?`<div class="tech-txt">${e(s.tech)}</div>`:''}${s.advice?`<div class="advice-txt">${e(s.advice)}</div>`:''}</div>`;
  }

  let infoHtml = '';
  if (s.basic)   infoHtml += `<div class="info-lbl">基本情報</div><div class="info-txt">${e(s.basic)}</div>`;
  if (s.shikiho) infoHtml += `<div class="info-lbl">四季報</div><div class="shikiho-txt">${e(s.shikiho)}</div>`;

  const rb = ratingBadge(s.rating);

  let gureenHtml = '';
  if (s.is_gureen) {
    const stripTag = t => t ? t.replace(/ぐりーん銘柄\d+\/\d+/g,'').replace(/^[|｜\s]+/,'').trim() : '';
    const memo = [stripTag(s.note), s.holding_view].filter(t=>t).join('　');
    if (memo) gureenHtml = `<div class="gureen-box"><div class="gureen-lbl">💹 検討メモ</div><div class="gureen-note">${e(memo)}</div></div>`;
  }
  let higezuraHtml = '';
  if (s.is_higezura) {
    const memo = [s.note, s.holding_view].filter(t=>t && !t.includes('ひげづら')).join('　');
    if (memo) higezuraHtml = `<div class="higezura-box"><div class="higezura-lbl">🧔 検討メモ</div><div class="higezura-note">${e(memo)}</div></div>`;
  }

  const savedMemo = localStorage.getItem('memo_'+s.code)||'';

  return `<div class="card ${sigClass(s.signal)}">
  <div class="card-top">
    <div class="card-left">
      <div class="name-row"><span class="name">${e(s.name)}</span><span class="code">${e(s.code)}</span></div>
      <div class="badges">${badges}</div>
      ${infoHtml}${rb?`<div style="margin-top:4px">${rb}</div>`:''}
    </div>
    <div class="card-right">
      <div class="price-val">${e(s.price)}</div>
      <div class="change-val ${chClass(s.change)}">${e(s.change)||'-'}</div>
      <div class="target-area">${targetHtml}</div>
    </div>
  </div>
  ${pnlHtml}${techHtml}${gureenHtml}${higezuraHtml}
  <div class="chart-area" id="chart-${e(s.code)}" data-code="${e(s.code)}"></div>
  <div class="memo-section">
    <div class="memo-lbl">📝 メモ</div>
    <textarea class="memo-ta" id="memo-${e(s.code)}" placeholder="メモを入力...">${e(savedMemo)}</textarea>
    <button class="memo-btn" onclick="saveMemo('${e(s.code)}')">💾 保存</button>
  </div>
</div>`;
}

  <div class="memo-section">
    <div class="memo-lbl">📝 メモ</div>
    <textarea class="memo-ta" id="memo-${e(s.code)}" placeholder="メモを入力...">${e(savedMemo)}</textarea>
    <button class="memo-btn" onclick="saveMemo('${e(s.code)}')">💾 保存</button>
  </div>
</div>`;
}

const LIST_COLS = [
  {key:'signal', label:''},
  {key:'code',   label:'コード'},
  {key:'name',   label:'銘柄名'},
  {key:'sector', label:'セクター'},
  {key:'price',  label:'株価'},
  {key:'change', label:'前日比'},
  {key:'target', label:'目標株価'},
  {key:'upside', label:'上昇余地'},
  {key:'rating', label:'評価'},
];

function renderList(stocks) {
  const ths = LIST_COLS.map(c=>{
    const arrow = sortKey===c.key ? (sortAsc?'▲':'▼') : '';
    return `<th onclick="sortBy('${c.key}')">${c.label}${arrow}</th>`;
  }).join('');
  const rows = stocks.map(s=>{
    const chCls = chClass(s.change);
    const upCls = s.upside&&s.upside.startsWith('-')?'neg':'pos';
    const sec = s.sector || s.comment?.substring(0,12) || '';
    return `<tr>
  <td>${e(s.signal||'')}</td>
  <td><strong>${e(s.code)}</strong></td>
  <td>${e(s.name)}</td>
  <td><span class="badge b-sector">${e(sec)}</span></td>
  <td>${e(s.price||s.price_)}</td>
  <td class="${chCls}">${e(s.change||s.change_||'-')}</td>
  <td>${e(s.target||'')}</td>
  <td class="${upCls}">${e(s.upside||'')}</td>
  <td>${ratingBadge(s.rating||'')}</td>
</tr>`;
  }).join('');
  return `<div class="list-wrap"><table class="list-view"><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let source;
  if (curTab==='breakout') source = D.breakout;
  else if (q) source = D.stocks;
  else source = getTabStocks(curTab);
  let stocks = applyFilter(source);

  if (sortKey) {
    stocks = [...stocks].sort((a,b)=>{
      let av = a[sortKey]||'', bv = b[sortKey]||'';
      const an = parseFloat(String(av).replace(/[^\d.-]/g,'')), bn = parseFloat(String(bv).replace(/[^\d.-]/g,''));
      if (!isNaN(an) && !isNaN(bn)) return sortAsc ? an-bn : bn-an;
      return sortAsc ? String(av).localeCompare(String(bv),'ja') : String(bv).localeCompare(String(av),'ja');
    });
  }

  let html = '';
  if (stocks.length===0) {
    html = '<div class="no-data">該当銘柄なし</div>';
  } else if (cardView) {
    const cards = stocks.map(s=> curTab==='breakout' ? renderBreakoutCard(s) : renderCard(s));
    html = `<div class="card-grid">${cards.join('')}</div>`;
  } else {
    html = renderList(stocks);
  }
  document.getElementById('stock-list').innerHTML = html;
  observeCharts();
}

function drawSVGChart(area, bars) {
  const last = bars.slice(-60);
  const n = last.length;
  if (!n) return;
  const W = area.getBoundingClientRect().width || area.offsetWidth || (window.innerWidth - 56) || 300;
  const H = 160;
  const padL = 40, padR = 4, padT = 6, padB = 6;
  const cw = W - padL - padR, ch = H - padT - padB;
  let pmin = Math.min(...last.map(b=>b.low));
  let pmax = Math.max(...last.map(b=>b.high));
  if (pmax === pmin) { pmax = pmin * 1.01 || pmin + 1; }
  const py = p => padT + ch * (1 - (p - pmin) / (pmax - pmin));
  const px = i => padL + (i + 0.5) * (cw / n);
  const bw = Math.max(cw / n * 0.65, 1);
  let parts = [];
  // grid + y labels (3 lines)
  [0, 0.5, 1].forEach(t => {
    const y = padT + ch * t;
    const p = pmax - (pmax - pmin) * t;
    parts.push(`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#ececec" stroke-width="1"/>`);
    parts.push(`<text x="${padL-3}" y="${(y+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="#bbb">${Math.round(p).toLocaleString()}</text>`);
  });
  // candles
  last.forEach((b, i) => {
    const x = px(i), up = b.close >= b.open;
    const col = up ? '#ef4444' : '#2563eb';
    const top = py(Math.max(b.open, b.close));
    const bot = py(Math.min(b.open, b.close));
    const bh  = Math.max(bot - top, 1);
    parts.push(`<line x1="${x.toFixed(1)}" y1="${py(b.high).toFixed(1)}" x2="${x.toFixed(1)}" y2="${py(b.low).toFixed(1)}" stroke="${col}" stroke-width="1"/>`);
    parts.push(`<rect x="${(x-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${col}"/>`);
  });
  area.innerHTML = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${H}px;display:block">${parts.join('')}</svg>`;
}

function loadChart(area) {
  if (area.dataset.loaded === '1') return;
  area.dataset.loaded = '1';
  const code = area.dataset.code;
  const allStocks = [...D.stocks, ...D.breakout];
  const stock = allStocks.find(s => s.code === code);
  const bars = stock && stock.bars ? stock.bars : [];
  if (!bars.length) { area.style.display = 'none'; return; }
  drawSVGChart(area, bars);
}

function observeCharts() {
  document.querySelectorAll('.chart-area[data-code]').forEach(el => {
    setTimeout(() => loadChart(el), 100);
  });
}

function saveMemo(code) {
  const ta = document.getElementById('memo-'+code);
  if (!ta) return;
  localStorage.setItem('memo_'+code, ta.value);
  const btn = ta.nextElementSibling;
  btn.textContent = '✅ 保存済み';
  setTimeout(()=>{btn.textContent='💾 保存';}, 1500);
}

window.addEventListener('scroll', ()=>{
  document.getElementById('scroll-top').style.display = window.scrollY>300?'flex':'none';
});
</script>
